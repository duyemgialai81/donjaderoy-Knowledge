# Spring Boot datasource
spring.datasource.url=jdbc:mysql://localhost:3306/duyem?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=duyem123

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=your-secret-key-must-be-at-least-32-characters-long-for-HS256
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=the-autumn-api
# Server
server.port=8080

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
